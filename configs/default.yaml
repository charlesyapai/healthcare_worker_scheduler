# Default configuration — mirrors the defaults in scheduler/instance.py and
# scheduler/model.py. The benchmark harness currently ignores this file (it
# sweeps doctor counts directly); it's kept for the UI / API layer to load.
# Every value here corresponds to a gap in docs/CONSTRAINTS.md §5.

horizon:
  n_days: 28
  start_weekday: 0            # Monday

tier_mix:                      # Used when generating from a single N
  junior_fraction: 0.35
  senior_fraction: 0.15
  # consultant = remainder

# Phase A: per-station weekday_enabled / weekend_enabled flags replace the
# old global weekend.am_pm_enabled toggle. AM/PM stations default to weekday-
# only (weekend_enabled: false). station.eligible_tiers is now advisory
# metadata only — per-doctor eligibility drives the solver.
stations:
  - {name: CT,        sessions: [AM, PM], required: 1, tiers: [consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: MR,        sessions: [AM, PM], required: 1, tiers: [consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: US,        sessions: [AM, PM], required: 1, tiers: [junior, senior, consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: XR_REPORT, sessions: [AM, PM], required: 1, tiers: [junior, senior, consultant], is_reporting: true, weekday_enabled: true, weekend_enabled: false}
  - {name: IR,        sessions: [AM, PM], required: 1, tiers: [consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: FLUORO,    sessions: [AM, PM], required: 1, tiers: [consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: GEN_AM,    sessions: [AM],     required: 1, tiers: [junior, senior, consultant], weekday_enabled: true, weekend_enabled: false}
  - {name: GEN_PM,    sessions: [PM],     required: 1, tiers: [junior, senior, consultant], weekday_enabled: true, weekend_enabled: false}

weekend:
  consultants_required: 1       # H8 weekend consultant headcount.

oncall:
  weeknight_junior_count: 1    # Gap #4
  weeknight_senior_count: 1

leave:
  expected_fraction: 0.03

weights:
  balance_sessions: 10
  balance_oncall:   20
  balance_weekend:  20
  reporting_spread: 5

solver:
  time_limit_s: 300
  num_workers:   8
